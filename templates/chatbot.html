<!DOCTYPE html>
<html lang="{{ lang }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AyushScan - AI Medical Assistant</title>
    <style>
      body { font-family: "Segoe UI", sans-serif; background:#f1f5f9; margin:0; padding:24px; }
      #chatbox { width:100%; max-width:820px; margin:0 auto; background:white; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,.1); padding:20px; }
      .topbar { display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
      .message { margin-bottom:15px; line-height:1.5; white-space:pre-wrap; }
      .user { text-align:right; color:#2563eb; }
      .bot { text-align:left; color:#166534; }
      #input-area { display:flex; gap:10px; margin-top:20px; }
      #input-area input { flex:1; padding:12px; border-radius:6px; border:1px solid #cbd5e1; }
      button, select { padding:10px 14px; border:0; border-radius:6px; cursor:pointer; }
      button { background:#2563eb; color:white; }
      .secondary { background:#e2e8f0; color:#0f172a; }
      .mode-buttons { display:flex; gap:10px; margin:15px 0; flex-wrap:wrap; }
      .mode-btn { background:#e5e7eb; color:#111827; font-weight:600; }
      .mode-btn.selected { background:#2563eb; color:white; }
      .loading { color:#64748b; font-style:italic; }
      .history { max-height:56vh; overflow-y:auto; padding:12px; border:1px solid #e5e7eb; border-radius:8px; background:#f8fafc; }
      a { color:#2563eb; text-decoration:none; font-weight:600; }
    </style>
  </head>
  <body>
    <div id="chatbox">
      <div class="topbar">
        <h2>Lia - AI Medical Assistant</h2>
        <a href="/dashboard">Back to Dashboard</a>
      </div>

      <div class="mode-buttons">
        <button class="mode-btn selected" type="button" onclick="setMode('price')">Medicine Price</button>
        <button class="mode-btn" type="button" onclick="setMode('gemini')">Ask AI</button>
        <button class="secondary" type="button" id="listenBtn">Listen</button>
        <button class="secondary" type="button" id="speakToggle">Speech On</button>
      </div>

      <div id="messages" class="history">
        <div class="message bot">Hello. Ask about medicine prices, a bill charge, nearby hospitals, or Ayushman Bharat coverage.</div>
        {% for item in history %}
          <div class="message user">{{ item.user_message }}</div>
          <div class="message bot">{{ item.bot_response }}</div>
        {% endfor %}
      </div>

      <div id="input-area">
        <input type="text" id="userInput" placeholder="Type your message in English, Hindi, or Hinglish..." />
        <button type="button" onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      let selectedMode = "price";
      let speechEnabled = true;
      const messages = document.getElementById("messages");
      const input = document.getElementById("userInput");

      function setMode(mode) {
        selectedMode = mode;
        document.querySelectorAll(".mode-btn").forEach((btn) => btn.classList.remove("selected"));
        document.querySelector(`.mode-btn[onclick="setMode('${mode}')"]`).classList.add("selected");
      }

      function appendMessage(text, sender, extraClass = "") {
        const msg = document.createElement("div");
        msg.className = `message ${sender} ${extraClass}`.trim();
        msg.innerText = text;
        messages.appendChild(msg);
        msg.scrollIntoView({ behavior: "smooth" });
        return msg;
      }

      function speak(text, language) {
        if (!speechEnabled || !("speechSynthesis" in window)) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = language === "hindi" ? "hi-IN" : "en-IN";
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }

      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        appendMessage(text, "user");
        input.value = "";
        const loading = appendMessage("Thinking...", "bot", "loading");
        try {
          const res = await fetch("/chatbot/message", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, mode: selectedMode }),
          });
          const data = await res.json();
          loading.remove();
          const reply = data.reply || "Sorry, I could not understand that.";
          appendMessage(reply, "bot");
          speak(reply, data.language);
        } catch (err) {
          loading.remove();
          appendMessage("Assistant is temporarily unavailable. Please try again.", "bot");
        }
      }

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") sendMessage();
      });

      document.getElementById("speakToggle").addEventListener("click", (event) => {
        speechEnabled = !speechEnabled;
        event.target.textContent = speechEnabled ? "Speech On" : "Speech Off";
        if (!speechEnabled && "speechSynthesis" in window) window.speechSynthesis.cancel();
      });

      document.getElementById("listenBtn").addEventListener("click", () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          appendMessage("Speech recognition is not supported in this browser.", "bot");
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = "{{ 'hi-IN' if lang == 'hindi' else 'en-IN' }}";
        recognition.interimResults = false;
        recognition.onresult = (event) => {
          input.value = event.results[0][0].transcript;
          sendMessage();
        };
        recognition.onerror = () => appendMessage("I could not hear that clearly. Please try again.", "bot");
        recognition.start();
      });
    </script>
  </body>
</html>
